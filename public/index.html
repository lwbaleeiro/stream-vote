<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stream Vote — Enquetes em Tempo Real</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>Stream Vote</h1>
        <div class="header-actions">
          <div id="userProfile" class="user-profile hidden">
            <span id="usernameDisplay"></span>
            <button class="btn btn-ghost btn-sm" id="logoutBtn">Sair</button>
          </div>
          <div id="guestProfile" class="user-profile">
            <button class="btn btn-primary btn-sm" id="showAuthBtn">Entrar / Cadastrar</button>
          </div>
          <div class="connection-status" id="connectionStatus">
            <span class="status-dot"></span>
            <span class="status-text">Desconectado</span>
          </div>
        </div>
      </header>

      <!-- Seção de Autenticação (Agora Oculta por padrão) -->
      <section id="authSection" class="card auth-section hidden-toggle">
        <div class="section-header-compact">
          <h2 id="authTitle">Acesso</h2>
          <button class="btn-close" id="closeAuthBtn">✕</button>
        </div>
        <form id="authForm">
          <div class="form-group">
            <label for="username">Usuário</label>
            <input
              type="text"
              id="username"
              placeholder="Seu apelido"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Senha</label>
            <input
              type="password"
              id="password"
              placeholder="Sua senha"
              required
            />
          </div>
          <div class="auth-buttons">
            <button type="submit" class="btn btn-primary" id="loginBtn">
              Entrar
            </button>
            <button type="button" class="btn btn-ghost" id="registerBtn">
              Criar Conta
            </button>
          </div>
        </form>
      </section>

      <div class="layout-container">
        <!-- Sidebar Ranking -->
        <aside id="rankingSidebar" class="ranking-sidebar hidden">
          <div class="card ranking-card">
            <h2>🏆 Ranking</h2>
            <div id="rankingList" class="ranking-list">
              <p class="empty-state">Carregando...</p>
            </div>
          </div>
        </aside>

        <main class="main" id="mainContent"> <!-- Removido hidden para permitir carregar visitor -->
          <!-- Criar Enquete (Agora Oculto por padrão) -->
          <section id="createPollSection" class="card create-section hidden-toggle">
            <div class="section-header-compact">
              <h2>Criar Nova Enquete</h2>
              <button class="btn-close" id="closeCreateBtn">✕</button>
            </div>
            <form id="createPollForm">
              <div class="form-group">
                <label for="pollTitle">Título da Enquete</label>
                <input
                  type="text"
                  id="pollTitle"
                  placeholder="Ex: Qual a melhor linguagem?"
                  required
                />
              </div>
              <div class="form-group">
                <label>Opções</label>
                <div id="optionsContainer">
                  <div class="option-row">
                    <input
                      type="text"
                      class="option-input"
                      placeholder="Opção 1"
                      required
                    />
                    <label class="correct-option-label">
                      <input type="radio" name="correctOption" value="0" />
                      <span>Correta</span>
                    </label>
                  </div>
                  <div class="option-row">
                    <input
                      type="text"
                      class="option-input"
                      placeholder="Opção 2"
                      required
                    />
                    <label class="correct-option-label">
                      <input type="radio" name="correctOption" value="1" />
                      <span>Correta</span>
                    </label>
                  </div>
                </div>
                <button
                  type="button"
                  class="btn btn-secondary"
                  id="addOptionBtn"
                >
                  + Adicionar Opção
                </button>
              </div>
              <div class="form-group">
                <label for="pollEndDate">Data de Encerramento (Opcional)</label>
                <input type="datetime-local" id="pollEndDate" />
              </div>
              <button type="submit" class="btn btn-primary">
                Criar Enquete
              </button>
            </form>
          </section>

          <!-- Lista de Enquetes -->
          <section class="card polls-section">
            <div class="polls-header">
              <div class="title-with-badge">
                <h2>Enquetes Ativas</h2>
                <button class="btn btn-accent btn-sm" id="showCreatePollBtn">+ Nova Enquete</button>
              </div>
              <button class="btn btn-ghost" id="refreshBtn">↻ Atualizar</button>
            </div>
            <div class="carousel-wrapper">
              <button class="carousel-nav prev" id="prevActive">❮</button>
              <div id="pollsList" class="polls-list carousel-container">
                <p class="empty-state">
                  Nenhuma enquete ativa. Crie uma acima!
                </p>
              </div>
              <button class="carousel-nav next" id="nextActive">❯</button>
              <div class="carousel-dots" id="dotsActive"></div>
            </div>
          </section>

          <!-- Enquetes Encerradas -->
          <section class="card inactive-polls-section">
            <div class="polls-header">
              <h2>Histórico de Enquetes</h2>
            </div>
            <div class="carousel-wrapper">
              <button class="carousel-nav prev" id="prevInactive">❮</button>
              <div id="inactivePollsList" class="polls-list carousel-container">
                <p class="empty-state">Nenhuma enquete encerrada ainda.</p>
              </div>
              <button class="carousel-nav next" id="nextInactive">❯</button>
              <div class="carousel-dots" id="dotsInactive"></div>
            </div>
          </section>
        </main>
      </div>

      <!-- Toast de notificações -->
      <div id="toastContainer" class="toast-container"></div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
