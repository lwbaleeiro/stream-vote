<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stream Vote — Real-Time Polls</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="logo-container">
          <h1>Stream Vote</h1>
          <a href="https://github.com/lwbaleeiro/stream-vote" target="_blank" class="github-link" title="View on GitHub">
            <svg height="24" width="24" viewBox="0 0 16 16"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
          </a>
        </div>
        <div class="header-actions">
          <div id="userProfile" class="user-profile hidden">
            <span id="usernameDisplay"></span>
            <button class="btn btn-ghost btn-sm" id="logoutBtn">Logout</button>
          </div>
          <div id="guestProfile" class="user-profile">
            <button class="btn btn-primary btn-sm" id="showAuthBtn">Login / Register</button>
          </div>
          <div class="connection-status" id="connectionStatus">
            <span class="status-dot"></span>
            <span class="status-text">Disconnected</span>
          </div>
        </div>
      </header>

      <!-- Seção de Autenticação (Agora Oculta por padrão) -->
      <section id="authSection" class="card auth-section hidden-toggle">
        <div class="section-header-compact">
          <h2 id="authTitle">Access</h2>
          <button class="btn-close" id="closeAuthBtn">✕</button>
        </div>
        <div class="disclaimer">
          <p>⚠️ <strong>Important:</strong> This is a study project. Please <strong>do not use</strong> real-world passwords or sensitive data.</p>
        </div>
        <form id="authForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              placeholder="Your nickname"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Your password"
              required
            />
          </div>
          <div class="auth-buttons">
            <button type="submit" class="btn btn-primary" id="loginBtn">
              Login
            </button>
            <button type="button" class="btn btn-ghost" id="registerBtn">
              Create Account
            </button>
          </div>
        </form>
      </section>

      <div class="layout-container">
        <!-- Sidebar Ranking -->
        <aside id="rankingSidebar" class="ranking-sidebar hidden">
          <div class="card ranking-card">
            <h2>🏆 Ranking</h2>
            <div id="rankingList" class="ranking-list">
              <p class="empty-state">Loading...</p>
            </div>
          </div>
        </aside>

        <main class="main" id="mainContent"> <!-- Removido hidden para permitir carregar visitor -->
          <!-- Criar Enquete (Agora Oculto por padrão) -->
          <section id="createPollSection" class="card create-section hidden-toggle">
            <div class="section-header-compact">
              <h2>Create New Poll</h2>
              <button class="btn-close" id="closeCreateBtn">✕</button>
            </div>
            <form id="createPollForm">
              <div class="form-group">
                <label for="pollTitle">Poll Title</label>
                <input
                  type="text"
                  id="pollTitle"
                  placeholder="Ex: What is the best language?"
                  required
                />
              </div>
              <div class="form-group">
                <label>Options</label>
                <div id="optionsContainer">
                  <div class="option-row">
                    <input
                      type="text"
                      class="option-input"
                      placeholder="Option 1"
                      required
                    />
                    <label class="correct-option-label">
                      <input type="radio" name="correctOption" value="0" />
                      <span>Correct</span>
                    </label>
                  </div>
                  <div class="option-row">
                    <input
                      type="text"
                      class="option-input"
                      placeholder="Option 2"
                      required
                    />
                    <label class="correct-option-label">
                      <input type="radio" name="correctOption" value="1" />
                      <span>Correct</span>
                    </label>
                  </div>
                </div>
                <button
                  type="button"
                  class="btn btn-secondary"
                  id="addOptionBtn"
                >
                  + Add Option
                </button>
              </div>
              <div class="form-group">
                <label for="pollEndDate">End Date (Optional)</label>
                <input type="datetime-local" id="pollEndDate" />
              </div>
              <button type="submit" class="btn btn-primary">
                Create Poll
              </button>
            </form>
          </section>

          <!-- Polls List -->
          <section class="card polls-section">
            <div class="polls-header">
              <div class="title-with-badge">
                <h2>Active Polls</h2>
                <button class="btn btn-accent btn-sm" id="showCreatePollBtn">+ New Poll</button>
              </div>
              <button class="btn btn-ghost" id="refreshBtn">↻ Refresh</button>
            </div>
            <div class="carousel-wrapper">
              <button class="carousel-nav prev" id="prevActive">❮</button>
              <div id="pollsList" class="polls-list carousel-container">
                <p class="empty-state">
                  No active polls. Create one above!
                </p>
              </div>
              <button class="carousel-nav next" id="nextActive">❯</button>
              <div class="carousel-dots" id="dotsActive"></div>
            </div>
          </section>

          <!-- Inactive Polls -->
          <section class="card inactive-polls-section">
            <div class="polls-header">
              <h2>Poll History</h2>
            </div>
            <div class="carousel-wrapper">
              <button class="carousel-nav prev" id="prevInactive">❮</button>
              <div id="inactivePollsList" class="polls-list carousel-container">
                <p class="empty-state">No finished polls yet.</p>
              </div>
              <button class="carousel-nav next" id="nextInactive">❯</button>
              <div class="carousel-dots" id="dotsInactive"></div>
            </div>
          </section>
        </main>
      </div>

      <!-- Toast de notificações -->
      <div id="toastContainer" class="toast-container"></div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
